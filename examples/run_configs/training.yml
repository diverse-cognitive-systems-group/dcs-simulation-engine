# METADATA
name: Leadership Training
description: |
  An engine run configuration used for leadership training where human players play a teamwork game with characters that have different abilities or cognitive profiles (e.g. neurodivergence). Players work with simulated characters to accomplish a shared goal and then reflect on what they learned, challenges, etc. Players are evaluated based on the simulated characters experience and goal achievement performance.

# USER INTERFACE OPTIONS
ui:
  launch_gui: true
  registration_required: true

# PLAYERS ALLOWED
players:
  humans:
    all: true

# GAMES INCLUDED
games:
  - name: Teamwork
    overrides:
      pcs_allowed: neurotypical_human
      npcs_allowed: divergent_humans
      player_retry_budget: 6

# NEXT GAME STRATEGY
next_game_strategy:
  strategy:
    id: underplayed_priorities

# DATA COLLECTION FORMS
forms:
  - name: training_consent
    trigger: before_all
    questions:
      - type: message
        prompt: |
          # Training Participation Consent

          You are being asked to participate in a voluntary training experience designed to help you engage with and understand a range of cognitive styles, perspectives, and interaction patterns, including those associated with neurodivergent and otherwise underrepresented populations.

          During this training, you will interact with simulated characters. These characters are not real individuals and are not intended to fully represent any specific person or group. Instead, they are designed to approximate certain behavioral patterns, communication styles, and perceptual or cognitive tendencies.

          This training is for learning purposes only. You may stop at any time.
      - type: single_choice
        key: consent
        label: Do you understand the purpose of this training and agree to participate?
        options:
          - I understand and agree to participate in this training.
        required: true
