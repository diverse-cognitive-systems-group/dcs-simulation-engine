# METADATA
name: Expert Evaluation
description: |
  A DCS-SE expert evaluation study for assessing simulation quality, where players select their area of expertise and are assigned to play simulated characters that match it. They provide in-game and post-game feedback on character quality.

seed: 42

# USER INTERFACE OPTIONS
ui:
  launch_gui: true
  registration_required: true

# PLAYERS ALLOWED
players:
  humans:
    all: true

# GAMES INCLUDED
games:
  - name: Explore
  - name: Infer Intent
  - name: Foresight
  - name: Goal Horizon
  - name: Teamwork

# NEXT GAME STRATEGY
next_game_strategy:
  strategy:
    # Player may freely select any non-player character that matches their expertise.
    id: expertise_matched_character_batch
    # id: expertise_matched_character_next
    # id: expertise_matched_character_choice
    # Player is assigned an NPC matching their expertise and must complete all associated games/scenarios for that character before moving to another.
    allow_choice_if_multiple: false
    require_completion: true

forms:
  - name: research_participation_consent
    trigger:
      event: before_all_assignments
      match: null
    questions:
      - prompt: |
          Informed Consent for Research Study Participation

          You are being asked to be a volunteer in a research study. You may not participant if you are under 18-years-old or located outside of the United States. The purpose of this study is to explore how people with diverse perspectives and abilities interact with others, and how we can make it easier for people of different abilities to engage meaningfully with the world.

          What Participation Involves
            - Gameplay: You will be asked to play a game that involves chatting with simulated characters. The goal is to explore how you interpret what others care about, their goals and what they may be trying to communicate.
            - Conversations: If you opt in for follow-up contact, you may be asked to take part in one or more conversations with a researcher. These are flexible in format, length, and topics, depending on your needs. Conversations typically last 20–45 minutes and may be audio recorded with your permission. You are free to skip any questions and may withdraw at any time, even after the study. 

          Voluntary Participation
            - Your participation is completely voluntary.
            - You may stop/withdraw at any time, for any reason without problem. 
            - You are not required to answer any questions you do not wish to. 

          Privacy and Confidentiality
            - Identifiable information will only be collected if you choose to provide it for follow-up purposes; otherwise, responses are anonymous. 
            - Any identifiable information will be coded to protect your identity. 
            - The risks of participation are no greater than those of everyday activities. 
            - You may request that your information be deleted at any time. 

          Oversight
          This study complies with all applicable laws and confidentiality standards. The Georgia Institute of Technology Institutional Review Board (IRB) and the Office of Human Research Protections may review study records to ensure proper conduct.

          Contacts
          For questions about this study, please reach out to:
          - Dr. Bruce Walker, Principal Investigator: bruce.walker@psych.gatech.edu 
          - McKinnley Workman: dcs@psych.gatech.edu 

          If you have any questions about your rights as a research subject, you may contact Georgia Institute of Technology Office of Research Integrity Assurance at IRB@gatech.edu. Thank you for participating in this study.
      - answer_type: single_choice
        key: consent
        prompt: Do you consent to participate in this research study under the terms
          described above?
        options:
          - I consent to participate in this research study.
        required: true
      - answer_type: single_choice
        key: consent_to_followup
        prompt: Do you consent follow-up contact for this research study?
        options:
          - I consent to follow-up contact for this research study.
        required: false

  - name: expertise_intake
    trigger:
      event: before_all_assignments
      match: null
    questions:
      - answer_type: multi_choice
        key: expertise
        prompt: |
          Following this intake, you will engage with simulated characters and evaluate how well they align with your real-world experience. 

          Select all areas where you have sufficient experience or expertise; your selections will determine which characters you are eligible to evaluate.
        options:
          - ADHD / attention regulation divergence
          - Anxiety / hypervigilance
          - Autistic / autism
          - Obsessive-compulsive disorder (OCD) / intrusive thoughts / compulsive
            / obsessive patterns
          - Deaf / hard of hearing / non hearing / ASL user / sign language user
          - Low vision / visually impaired / visual impairment
          - Mobility impaired / mobility limitation / wheelchair user / non
            ambulatory / paralysis / partial paralysis / orthostatic / temporary
            mobility impairment
          - Cancer / oncological illness
          - Down syndrome
          - Sensory divergence / highly sensitive person (hsp) / synesthesia /
            tactile synesthesia / perfect pitch
          - Metabolic divergence / obesity
          - State-dependent speech / gestural communicator / visual language user
            / whistled language speaker
          - Artificial intelligence / LLM / GPT / large language model / software
            agent / classification algorithm / sorting algorithm
          - Assistive robot / assistive tablet / smart tablet / intelligent
            exoskeleton / robotic guide dog / protocol negotiation robot /
            automated eye-makeup machine / automated haircut machine
          - Biohacker / cyborg / human enhancement / iron man suit
          - Neural organoid / human neural organoid / cell / biological systems
          - Non-human animals / planarian / flatworm / frog embryo / prey mammal
            / small prey mammal
          - Alien collective / distributed mind / visual-cognition alien
          - Nanotechnology / molecular self-assembly system
          - eVTOL hybrid vehicle / flying car
          - Thermostat / thermal regulator
          - Multi divergent
        required: true
      - answer_type: string
        key: expertise_explanation
        prompt: Briefly describe your experience or expertise in the areas selected
          above (e.g., lived, professional, or caregiver experience). This will
          help determine which characters you evaluate.
        required: true

  - name: post_game_feedback
    trigger:
      event: after_assignment
      match: null
    questions:
      - answer_type: single_choice
        key: alignment_rating
        prompt: For this gameplay session, how well did the simulated character align
          with your real-world experience?
        options:
          - Highly aligned with my experience.
          - Generally aligned with my experience, with some exceptions.
          - Mixed or inconsistent alignment.
          - Largely not aligned with my experience.
        required: true
      - answer_type: string
        key: alignment_explanation
        prompt: Please explain your rating. What aspects of the experience were well
          aligned, and where did it fall short?
        required: true
      - answer_type: string
        key: extra
        prompt: Anything else?
        required: false

  - name: outtake
    trigger:
      event: after_all_assignments
      match: null
    questions:
      - answer_type: single_choice
        key: overall_alignment_rating
        prompt: Across ALL gameplay sessions, how well did the simulated character align
          with your real-world experience?
        options:
          - Highly aligned with my experience.
          - Generally aligned with my experience, with some exceptions.
          - Mixed or inconsistent alignment.
          - Largely not aligned with my experience.
        required: true
      - answer_type: single_choice
        key: useful_for_training
        prompt: |
          An intended use case of the simulation engine is to provide exposure to forms of perception, cognition, and lived experience that users may not regularly encounter.

          In your opinion, could this system serve as an effective introductory exposure (e.g., for workplace training or education) to help people engage more comfortably and thoughtfully with individuals whose experiences differ from their own?
        options:
          - Yes, I this could be effective for introductory exposure.
          - No, I this system would not be effective for that purpose.
        required: true
      - answer_type: string
        key: useful_for_training_explanation
        prompt: |
          Explain your answer to the previous question. If yes/no, why? What limitations that would prevent this system from being effective for introductory exposure?
        required: true
      - answer_type: string
        key: extra
        prompt: Anything else?
        required: false
