# METADATA
name: Benchmark Human Performance
description: |
  An engine run configuration used for benchmarking human performance across games and characters. Players play all games with either evaluations displayed or not.

seed: 42

# USER INTERFACE OPTIONS
ui:
  launch_gui: true
  registration_required: true

# PLAYERS ALLOWED
players:
  humans:
    all: true

# GAMES INCLUDED
games:
  - name: Infer Intent
    overrides:
      # or false if you don't want the human to learn from game scores
      show_final_score: true
  - name: Foresight
    overrides:
      show_final_score: true
  - name: Goal Horizon
    overrides:
      show_final_score: true
  - name: Teamwork
    overrides:
      show_final_score: true

# NEXT GAME STRATEGY
next_game_strategy:
  strategy:
    id: next_incomplete_combination
    allow_choice_if_multiple: false
    require_completion: true

# DATA COLLECTION FORMS
forms:
  - name: research_participation_consent
    trigger:
      event: before_all_assignments
      match: null
    questions:
      - prompt: |
          Informed Consent for Research Study Participation

          You are being asked to be a volunteer in a research study. You may not participant if you are under 18-years-old or located outside of the United States. The purpose of this study is to explore how people with diverse perspectives and abilities interact with others, and how we can make it easier for people of different abilities to engage meaningfully with the world.

          What Participation Involves
            - Gameplay: You will be asked to play a game that involves chatting with simulated characters. The goal is to explore how you interpret what others care about, their goals and what they may be trying to communicate.
            - Conversations: If you opt in for follow-up contact, you may be asked to take part in one or more conversations with a researcher. These are flexible in format, length, and topics, depending on your needs. Conversations typically last 20–45 minutes and may be audio recorded with your permission. You are free to skip any questions and may withdraw at any time, even after the study. 

          Voluntary Participation
            - Your participation is completely voluntary.
            - You may stop/withdraw at any time, for any reason without problem. 
            - You are not required to answer any questions you do not wish to. 

          Privacy and Confidentiality
            - Identifiable information will only be collected if you choose to provide it for follow-up purposes; otherwise, responses are anonymous. 
            - Any identifiable information will be coded to protect your identity. 
            - The risks of participation are no greater than those of everyday activities. 
            - You may request that your information be deleted at any time. 

          Oversight
          This study complies with all applicable laws and confidentiality standards. The Georgia Institute of Technology Institutional Review Board (IRB) and the Office of Human Research Protections may review study records to ensure proper conduct.

          Contacts
          For questions about this study, please reach out to:
          - Dr. Bruce Walker, Principal Investigator: bruce.walker@psych.gatech.edu 
          - McKinnley Workman: dcs@psych.gatech.edu 

          If you have any questions about your rights as a research subject, you may contact Georgia Institute of Technology Office of Research Integrity Assurance at IRB@gatech.edu. Thank you for participating in this study.
      - answer_type: single_choice
        key: consent
        prompt: Do you consent to participate in this research study under the terms
          described above?
        options:
          - I consent to participate in this research study.
        required: true
      - answer_type: single_choice
        key: consent_to_followup
        prompt: Do you consent follow-up contact for this research study?
        options:
          - I consent to follow-up contact for this research study.
        required: false

  - name: intake
    trigger:
      event: before_all_assignments
      match: null
    questions:
      - answer_type: single_choice
        key: age_range
        prompt: What is your age range?
        options:
          - 18-34
          - 35-54
          - 55+
        required: true
      - answer_type: single_choice
        key: technical_savviness
        prompt: How would you rate your technical proficiency (comfort with digital
          tools, software, or technical systems) relative to your peers (i.e.
          those with similar age and backgrounds). systems)?
        options:
          - Higher than average relative to my peers
          - About average relative to my peers
          - Lower than average relative to my peers
        required: true
      - answer_type: string
        key: peers
        prompt: Who do you consider your peers when assessing your technical
          proficiency? Why do you consider your proficiency to be higher,
          average, or lower than them?
        required: true
      - answer_type: multi_choice
        key: experience_with_dcs
        prompt: What types of experience do you have engaging with individuals whose
          sensory, cognitive, or physical experiences differ from typical norms
          (e.g., neurodivergence, disability, chronic illness, or other forms of
          divergence)? Select all that apply.
        options:
          - Personal lived experience
          - Close family members or friends
          - Professional experience (e.g., healthcare, education, research)
          - Limited or no direct experience
        required: true
      - answer_type: string
        key: background_affecting_engagement
        prompt: Are there any cultural, philosophical, religious, educational, or other
          background experiences that may affect how you engage with individuals
          whose sensory, perceptual, physical, cultural, etc. experiences may be
          very different from your own?
        required: false

  - name: outtake
    trigger:
      event: after_all_assignments
      match: null
    questions:
      - answer_type: string
        key: performance_factors
        prompt: Reflecting on your overall gameplay, were there any factors that may
          have influenced your performance or how your results should be
          interpreted (e.g., confusion, difficulty understanding certain
          characters, interface issues, distractions, or strategies you used)?
          Please describe anything important to consider.
        required: false
      - answer_type: string
        key: learning_outcomes
        prompt: Did you learn anything during the experience? This could include
          strategies for playing the game, ways of engaging with certain
          characters, patterns you noticed, or anything else that helped (or
          hindered) your performance.
        required: false
      - answer_type: string
        key: extra_feedback
        prompt: Anything else to share?
        required: false
