# Devcontainer compose only provisions MongoDB.
# Server behavior is chosen by the run config you pass to `dcs server`.
# Use a config with `ui.registration_required: false` for anonymous local play.
services:
  mongo:
    image: mongo:8.0
    container_name: dcs-mongo
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all", "--noauth"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://127.0.0.1:27017/admin",
          "--eval",
          "quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mongo_data:
    driver: local
