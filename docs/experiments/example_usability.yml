# Example usability config — documents every available option.
# Load with: ExperimentConfig.load("experiments/examples/example_usability.yml")

# ── Top-level fields ──────────────────────────────────────────────────────────

# Unique experiment identifier. Used as the key in API paths:
#   POST /api/experiments/{name}/players
#   GET  /api/experiments/{name}/setup
name: example-usability

# Human-readable description. Multiline block scalars are fine.
description: |
  Example usability study that demonstrates every configuration option.
  Participants are randomly assigned one game from the full game list and
  complete intake and feedback forms around their session.

# Optional study condition label. Omit if not needed.
# Allowed values: "learning" | "static"
condition: learning

# ── Assignment strategy ───────────────────────────────────────────────────────

assignment_strategy:
  # The only registered strategy today is "random_unique".
  # It ensures no player is assigned the same game twice and each game
  # accumulates players until its quota is reached.
  strategy: random_unique

  # Games to include in the study. Names are normalized at parse time so
  # snake_case, Title Case, and hyphen variants all resolve to the same
  # canonical game. Available games:
  #   Explore | Infer Intent | Foresight | Goal Horizon | Teamwork
  games:
    - Explore
    - Infer Intent
    - Foresight
    - Goal Horizon

  # How many unique players must complete each game before that game slot
  # is considered full. Must be a positive integer.
  quota_per_game: 10

  # Maximum number of games one player may be assigned across the study.
  # Must be ≤ len(games). Omit to allow a player to play every listed game.
  max_assignments_per_player: 1

  # Seed for the deterministic assignment RNG. Accepts a string or integer.
  # Change the seed to re-randomize assignments without altering other config.
  seed: example-usability-v1

  # When true, only players whose character is PC-eligible are considered
  # as valid assignment targets. Default: false.
  pc_eligible_only: true

  # Controls how assignments are created:
  #   "auto"          — the system picks the game for the player (default)
  #   "player_choice" — the player selects from their eligible options
  assignment_mode: auto

# ── Forms ─────────────────────────────────────────────────────────────────────

# List of forms shown before or after gameplay. Form names are normalized to
# snake_case and must be unique. Omit the key entirely to run with no forms.
forms:

  # ── Before-play form ───────────────────────────────────────────────────────
  - name: intake                  # Normalized to snake_case; must be unique.
    before_or_after: before       # "before" | "after"

    questions:
      # A question with no answer_type acts as a header / instructional prompt.
      # It is displayed but collects no data. key is optional; auto-generated
      # from the prompt text if omitted.
      - prompt: |
          Welcome! Please complete this short intake form before you begin.

      # answer_type: string — open-ended free text.
      # key is optional; auto-generated from the prompt if omitted.
      - key: background
        prompt: Briefly describe your professional or academic background.
        answer_type: string

      # answer_type: number — integer or float input.
      - key: age
        prompt: What is your age?
        answer_type: number
        required: true           # required: true enforces a non-empty answer.

      # answer_type: email — validated email address.
      - key: contact_email
        prompt: Email address (optional, for follow-up only)
        answer_type: email

      # answer_type: phone — phone number input.
      - key: contact_phone
        prompt: Phone number (optional)
        answer_type: phone

      # answer_type: bool — true / false toggle.
      - key: has_prior_experience
        prompt: Have you used a simulation interface like this before?
        answer_type: bool
        required: true

      # answer_type: single_choice — exactly one selection from options.
      # options is required for single_choice and multi_choice; forbidden otherwise.
      - key: technical_savviness
        prompt: How technically savvy do you consider yourself?
        answer_type: single_choice
        required: true
        options:
          - Low
          - Medium
          - High

      # answer_type: multi_choice — one or more selections from options.
      - key: technical_background
        prompt: Which of the following best describes your background? (select all that apply)
        answer_type: multi_choice
        options:
          - Casual computer user
          - Regular gamer
          - Competitive / experienced gamer
          - Programming or scripting experience
          - Software engineer / developer
          - Data science / machine learning
          - IT / system administration
          - Technical researcher or engineer
          - Other technical background

  # ── After-play form ────────────────────────────────────────────────────────
  - name: usability_feedback
    before_or_after: after

    questions:
      - prompt: |
          Thank you for participating! Please share your feedback below.

      - key: overall_experience
        prompt: How would you rate your overall experience?
        answer_type: single_choice
        required: true
        options:
          - Very poor
          - Poor
          - Neutral
          - Good
          - Excellent

      - key: usability_issues
        prompt: Were any parts of the interface confusing or difficult to use?
        answer_type: string

      - key: positive_usability
        prompt: Were there parts of the interface that worked especially well?
        answer_type: string

      - key: would_recommend
        prompt: Would you recommend this experience to a colleague?
        answer_type: bool

      - key: bugs_or_issues
        prompt: Did you encounter any bugs or technical issues?
        answer_type: string

      - key: additional_feedback
        prompt: Anything else you would like to share?
        answer_type: string
