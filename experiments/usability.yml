name: usability
description: |
  A GUI usability study allows players interact with default games and characters to identify any usability issues.
condition: learning
assignment_strategy:
  seed: 43 # for reproducibility of random assignment
  # use default random_unique_game strategy
  strategy: full_character_access
  games:
    - Infer Intent
    - Goal Horizon
  allow_choice_if_multiple: true
  require_completion: false
forms:
  - name: intake
    trigger:
      event: before_all_assignments
      match: null
    questions:
      - key: professional_background
        prompt: Describe your professional background (e.g., industry, role, years of
          experience).
        required: true
        answer_type: string

      - key: technical_savviness
        prompt: How technically savvy do you consider yourself?
        answer_type: single_choice
        required: true
        options:
          - On the lower end
          - On the higher end

      - key: technical_savviness_explanation
        prompt: Explain why you consider yourself on the lower or higher end of
          technical savviness (professional experience, hobbies, etc.).
        answer_type: string
        required: true
  - name: outtake
    trigger:
      event: after_assignment
      match: null
    questions:
      - key: usability_difficulty
        prompt: What parts were confusing or difficult? (e.g., understanding what to do,
          how to do it, or interpreting results)
        answer_type: string
        required: true

      - key: usability_ease
        prompt: What parts were easy or intuitive to use? Please describe.
        answer_type: string
        required: true

      - key: other_errors_or_issues
        prompt: Any errors, bugs, or unexpected behavior not described above that we
          should know about?
        answer_type: string

      - key: overall_usability
        prompt: Overall, how easy or difficult was it to use and understand?
        answer_type: single_choice
        required: true
        options:
          - Very difficult
          - Difficult
          - Neutral
          - Easy
          - Very easy

      - key: additional_feedback
        prompt: Anything else?
        answer_type: string
