app = "dcs-free-play-ui"
primary_region = "iad"
[build]
  dockerfile = "../../docker/ui.fly.dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
