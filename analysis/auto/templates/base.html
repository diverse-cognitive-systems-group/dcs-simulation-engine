<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- DataTables Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

  <!-- DataTables Buttons -->
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">

  <!-- Plotly, jQuery, and DataTables must all load before body content so inline scripts work -->
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.colVis.min.js"></script>

  <style>
    body {
      font-size: 0.9rem;
    }

    /* Sidebar */
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      background-color: #f8f9fa;
      border-right: 1px solid #dee2e6;
      padding-top: 1rem;
    }

    .sidebar .nav-link {
      color: #495057;
      padding: 0.3rem 1rem;
      font-size: 0.85rem;
    }

    .sidebar .nav-link:hover {
      color: #0d6efd;
      background-color: #e9ecef;
      border-radius: 4px;
    }

    .sidebar .nav-link.active {
      color: #0d6efd;
      background-color: #e9ecef;
      border-radius: 4px;
      font-weight: 600;
    }

    .sidebar-heading {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #6c757d;
      padding: 0.5rem 1rem 0.2rem;
    }

    /* Sections */
    section {
      scroll-margin-top: 1rem;
    }

    section h2 {
      font-size: 1.4rem;
      border-bottom: 2px solid #dee2e6;
      padding-bottom: 0.4rem;
      margin-bottom: 1rem;
    }

    /* Tables */
    .dataTables_wrapper {
      font-size: 0.82rem;
    }

    .dt-buttons .btn {
      font-size: 0.78rem;
    }

    /* Per-column filter inputs in table footers */
    tfoot input {
      min-width: 3rem;
    }

    /* Charts */
    .chart-container {
      margin-bottom: 1.5rem;
    }

    /* Definition list in metadata */
    .dl-meta dt {
      font-weight: 600;
      color: #495057;
    }

    .dl-meta dd {
      color: #212529;
      margin-bottom: 0.4rem;
    }
  </style>
</head>

<body>

  <div class="container-fluid">
    <div class="row g-0">

      <!-- Sidebar -->
      <nav class="col-md-2 d-none d-md-block sidebar">
        <div class="sidebar-heading">Sections</div>
        <ul class="nav flex-column">
          {% for anchor, section_title, _ in sections %}
          <li class="nav-item">
            <a class="nav-link" href="#section-{{ anchor }}">{{ section_title }}</a>
          </li>
          {% endfor %}
        </ul>
      </nav>

      <!-- Main content -->
      <main class="col-md-10 px-4 py-3">
        <h1 class="mb-1">{{ title }}</h1>
        <p class="text-muted mb-4" style="font-size:0.8rem;">
          Auto-generated {{ generated_at }}
        </p>

        {% for anchor, section_title, html_fragment in sections %}
        <section id="section-{{ anchor }}" class="mb-5">
          <h2>{{ section_title }}</h2>
          {{ html_fragment | safe }}
        </section>
        {% endfor %}
      </main>

    </div><!-- /.row -->
  </div><!-- /.container-fluid -->

  <!-- Active sidebar link tracking via IntersectionObserver -->
  <script>
    (function () {
      var links = {};
      document.querySelectorAll('.sidebar .nav-link[href^="#section-"]').forEach(function (a) {
        links[a.getAttribute('href').slice(1)] = a;
      });

      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          var link = links[entry.target.id];
          if (!link) return;
          if (entry.isIntersecting) {
            Object.values(links).forEach(function (l) { l.classList.remove('active'); });
            link.classList.add('active');
          }
        });
      }, { rootMargin: '0px 0px -60% 0px', threshold: 0 });

      document.querySelectorAll('section[id^="section-"]').forEach(function (sec) {
        observer.observe(sec);
      });
    })();
  </script>

  <!-- Bootstrap JS (loaded here so it doesn't block initial render) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
